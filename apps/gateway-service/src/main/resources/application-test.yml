# Test profile defaults. Integration tests inject concrete values for
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri (WireMock / MockWebServer)
# and spring.data.redis.host (Redis Testcontainer) via @DynamicPropertySource.

spring:
  cloud:
    gateway:
      routes:
        - id: stub-downstream
          uri: ${TEST_DOWNSTREAM_URI:http://localhost:0}
          predicates:
            - Path=/api/v1/procurement/**

scmplatform:
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:http://test-issuer,global-account-platform}
    required-tenant-id: scm

# Disable the JWKS startup probe by default in the test profile. Slice tests and
# unit tests do not stand up a JWKS endpoint; integration tests that DO stand
# one up explicitly re-enable it via @DynamicPropertySource if they need to
# exercise the fail-fast behaviour.
gateway:
  jwks:
    startup-probe:
      enabled: false
